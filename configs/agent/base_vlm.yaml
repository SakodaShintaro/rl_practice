# @package _global_
use_lora: 0
vlm_model_id: Qwen/Qwen3.5-0.8B
num_state_queries: 219
text_action_mode: none
use_prompt: 1
use_feedback: 0
max_new_tokens: 64
max_prompt_tokens: 256
pad_token_id: 0
text_q_margin: 1.0
# How frames are fed into the VLM.
#   mem      : MEM-style VideoEncoder (causal temporal attention across frames in ViT,
#              only the last-frame embedding is injected into the LLM context).
#   sequence : standard multi-image prompt <image_1>...<image_T>; each frame goes
#              through the VLM's vision encoder independently, all frames injected.
image_mode: sequence
