# @package _global_
agent_type: streaming
encoder: spatial_temporal
temporal_model_type: transformer
image_processor_type: ae
policy_type: diffusion
batch_size: 1
learning_rate: 2e-6
use_eligibility_trace: 1
et_lambda: 0.5

self_forcing:
  enabled: false
  config_path: configs/self_forcing/b2d_finetune.yaml
  checkpoint_path: null
  num_context_blocks: 1
  seconds_ahead: 1.0
  predict_interval: 4
