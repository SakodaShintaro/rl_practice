# @package _global_
env_id: CARLA-Leaderboard-v0
step_limit: 100_000

env_factory:
  _target_: vla_streaming_rl.wrappers.make_carla_env
  # Route source for the training env.
  # - route_xml: if set, routes are loaded from this Bench2Drive-format XML.
  #   null falls back to sampling a random 200 m route in Town01 each episode.
  # - route_id: optional, restrict to one specific route id from the XML.
  #   Only valid with sequence_mode='random'. null means "pick a random
  #   route from the XML each episode".
  # - sequence_mode: 'random' (legacy: random pick each reset, single-town
  #   XML only) or 'sequential' (walk routes in XML order starting at
  #   start_index; towns may differ between routes and the env reloads the
  #   world on town change). 'sequential' is the bench2drive220 driver.
  # - start_index: 0-indexed cursor for sequential mode. Use this to
  #   resume from a specific position (e.g. after a crash).
  #
  # The Bench2Drive eval artifacts (eval_res/, eval_viz/) are written
  # automatically under the Hydra run dir whenever route_xml is set —
  # nothing to configure here. weather.xml is picked up next to route_xml.
  route_xml: null
  route_id: null
  sequence_mode: random
  start_index: 0
