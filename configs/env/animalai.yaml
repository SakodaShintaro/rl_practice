# @package _global_
env_id: AnimalAI-v0
step_limit: 50_000

# Arenas are visited in round-robin order on each env.reset(). The shared
# task prompt for the VLM is defined in vla_streaming_rl.wrappers.
env_factory:
  _target_: vla_streaming_rl.wrappers.make_animalai_env
  arena_yamls:
    - ./external/animal-ai/configs/competition/01-01-01.yaml
    - ./external/animal-ai/configs/competition/01-01-02.yaml
    - ./external/animal-ai/configs/competition/01-01-03.yaml
    - ./external/animal-ai/configs/competition/01-02-01.yaml
    - ./external/animal-ai/configs/competition/01-02-02.yaml
    - ./external/animal-ai/configs/competition/01-02-03.yaml
