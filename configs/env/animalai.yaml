# @package _global_
env_id: AnimalAI-v0
step_limit: 500_000
image_save_interval: 10

# Curriculum: each reset has 50% chance of trying the next uncleared yaml in
# index order (progression) and 50% chance of picking a random already-cleared
# yaml (revisit). A yaml is "cleared" the first time the agent succeeds on it.
env_factory:
  _target_: vla_streaming_rl.wrappers.make_animalai_env
