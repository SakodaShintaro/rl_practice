# @package _global_
env_id: AnimalAI-v0
step_limit: 50_000

# Arenas are visited in round-robin order on each env.reset(). Each entry pairs
# an arena YAML (under external/animal-ai/configs/competition) with the prompt
# fed to the VLM for that scenario; both must describe the same task.
env_factory:
  _target_: vla_streaming_rl.wrappers.make_animalai_env
  arenas:
    - yaml: ./external/animal-ai/configs/competition/01-01-01.yaml
      prompt: ""
    - yaml: ./external/animal-ai/configs/competition/01-01-02.yaml
      prompt: ""
