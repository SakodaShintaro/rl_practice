exp_name: default
result_dir: results
trial_num: 1
env_id: CarRacing-v3
agent_type: on_policy
network_class: actor_critic_with_action_value
seed: -1
render: 1
off_wandb: false
wandb_group: default_group

# encoder
encoder: spatial_temporal
temporal_model_type: transformer
image_processor_type: ae

# policy
policy_type: diffusion

# network architecture
encoder_block_num: 1
use_lora: 0
target_layer_idx: 2
actor_hidden_dim: 512
actor_block_num: 1
critic_hidden_dim: 1024
critic_block_num: 1
separate_critic: 0
predictor_hidden_dim: 512
predictor_block_num: 2
predictor_step_num: 1
num_bins: 1

# training
learning_rate: 1e-4
max_grad_norm: 5.0
sparsity: 0.0
gamma: 0.99
step_limit: 1_000_000
seq_len: 1
horizon: 1
buffer_device: cuda
batch_size: 32
critic_loss_weight: 1.0
use_done: 1
normalizing_by_return: 0
image_save_interval: 100
accumulation_steps: 1
debug: false

# off_policy
buffer_size: 20000
learning_starts: 2000
detach_actor: 1
detach_critic: 0
detach_predictor: 0
disable_state_predictor: 0
dacer_loss_weight: 0.05
denoising_time: 0.9
denoising_steps: 1
vlm_model_id: Qwen/Qwen3.5-0.8B
expert_hidden_size: 8
state_expert_hidden_size: 576
num_state_queries: 1
state_mode: projection
text_action_mode: none

# AVG
use_eligibility_trace: 1
et_lambda: 0.5

# on_policy
buffer_capacity: 4096
on_policy_epoch: 10
clip_param_policy: 0.2
clip_param_value: 0.2
max_new_tokens: 64
max_prompt_tokens: 256
pad_token_id: 0
use_prompt: 1
use_feedback: 0
text_q_margin: 1.0
