program: scripts/train.py
method: bayes
metric:
  name: best_recent_average_score
  goal: maximize
parameters:
  learning_rate:
    min: 1e-6
    max: 1e-5
    distribution: log_uniform_values
  gamma:
    min: 0.0
    max: 1.0
    distribution: uniform
  use_lora:
    values: [0, 1]
  use_done:
    values: [0, 1]
  et_lambda:
    min: 0.0
    max: 1.0
    distribution: uniform
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
  - agent=vlm_streaming
  - env=gui
  - ${args_no_hyphens}
