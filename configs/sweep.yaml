program: scripts/train.py
method: random
parameters:
  learning_rate:
    values: [1e-4, 1e-5, 1e-6]
  gamma:
    values: [0.99, 0.9, 0.5]
  use_lora:
    values: [0, 1]
  use_done:
    values: [0, 1]
  prediction_type:
    values: ["velocity", "data"]
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
  - --config-name
  - gui_env
  - agent_type=streaming
  - ${args_no_hyphens}
