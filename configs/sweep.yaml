program: scripts/train.py
method: bayes
metric:
  name: best_recent_average_score
  goal: maximize
parameters:
  learning_rate:
    min: 1e-6
    max: 1e-5
    distribution: log_uniform_values
  gamma:
    min: 0.0
    max: 1.0
    distribution: uniform
  use_lora:
    values: [0, 1]
  use_done:
    values: [0, 1]
  prediction_type:
    values: ["velocity", "data"]
  max_step_count:
    min: 50
    max: 150
    distribution: int_uniform
  state_mode:
    values: ["expert", "projection"]
  target_layer_idx:
    min: 0
    max: 24
    distribution: int_uniform
  use_eligibility_trace:
    values: [0, 1]
  et_lambda:
    min: 0.0
    max: 1.0
    distribution: uniform
  dacer_loss_weight:
    min: 0.0
    max: 0.1
    distribution: uniform
  denoising_time:
    min: 0.8
    max: 1.0
    distribution: uniform
command:
  - ${env}
  - uv
  - run
  - python
  - ${program}
  - --config-name
  - gui_env
  - agent_type=streaming
  - ${args_no_hyphens}
