# Fine-tune Self-Forcing on bench2drive latents (single GPU).
# Pre-requisites (anchored at b2d_root):
#   1. scripts/split.py --src <b2d_root>          -> <b2d_root>/splits.json
#   2. scripts/encode_latents.py --src <b2d_root> -> <b2d_root>/latents/{train,valid}/<episode>.pt
# Launch:
#   uv run python scripts/train.py \
#       --config_path configs/b2d_finetune.yaml \
#       --root_dir /path/to/results \
#       --b2d_root <b2d_root>

# --- starting checkpoint ---
generator_ckpt: hf:gdhe17/Self-Forcing:checkpoints/self_forcing_dmd.pt
generator_ckpt_key: generator_ema   # use the EMA weights from the dmd checkpoint

# --- LoRA fine-tuning ---
lora:
  enabled: true
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - self_attn.q
    - self_attn.k
    - self_attn.v
    - self_attn.o
    - cross_attn.q
    - cross_attn.k
    - cross_attn.v
    - cross_attn.o

# --- trainer / loss ---
max_steps: 10
mixed_precision: true
context_noise: 0   # noise level for KV-cache context refresh in CausalInferencePipeline

# --- model shape (single source of truth for spatial resolution) ---
# pixel_height / pixel_width are the camera input resolution to the Wan VAE.
# Latent dims are pixel/8; image_or_video_shape is derived in code from these
# plus num_frames and the constant 16 latent channels.
pixel_height: 240
pixel_width: 416
num_frames: 21          # latents per training clip (former image_or_video_shape[1])
num_frame_per_block: 3
gradient_checkpointing: true
timestep_shift: 5.0

# --- dataset ---
# b2d_root is set per-machine via `--b2d_root` on the scripts/train.py CLI (not stored here).
b2d_caption: ""   # fixed empty caption (no CFG, no per-clip conditioning)
# Drop the leading frames per episode: in Bench2Drive the first few rgb_front
# frames show other vehicles falling/spawning into the scene from above.
b2d_skip_head_frames: 5

# --- inference ---
# WorldModelGoalPredictor reads this. Lookahead = num_frame_per_block*4 + 1 - predict_interval
# (e.g. 12 -> 1 frame ahead; 6 -> 7 frames ahead; 1 -> 12 frames ahead).
predict_interval: 12

# --- optimizer (LoRA-friendly LR; bump higher than full fine-tune since adapter init is identity) ---
seed: 0
lr: 1.0e-4
beta1: 0.9
beta2: 0.999
weight_decay: 0.01
batch_size: 1
ema_weight: 0.99
ema_start_step: 200

# --- logging / saving ---
log_iters: 2
gc_interval: 100
valid_iters: 100        # 0 disables; otherwise run validate() every N train steps
valid_batches: 16       # number of valid mini-batches averaged per validation pass
